<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Escola Alonzo Barbuda</title>

<!-- ÍCONES -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f5f5f5;
}

/* LINKS (REMOVE AZUL E SUBLINHADO) */
a {
  text-decoration: none;
  color: inherit;
}

/* TOPO */
.topo {
  background: #1e40af;
  color: white;
  padding: 15px;
}

.topo .container {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.logo {
  display: flex;
  align-items: center;
  gap: 10px;
}

.logo img {
  width: 40px;
}


.menu a {
  color: white;
  margin-left: 15px;
  font-weight: bold;
  transition: 0.3s;
}

.menu a:hover {
  color: #93c5fd;
}

/
.container {
  width: 90%;
  max-width: 1000px;
  margin: 20px auto;
}


.destaque a {
  color: black;
}

.destaque img {
  width: 100%;
  height: 300px;
  object-fit: cover;
  border-radius: 12px;
  transition: 0.3s;
}

.destaque img:hover {
  transform: scale(1.02);
}


.grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 15px;
  margin-top: 20px;
}

/* CARD */
.card {
  background: white;
  border-radius: 12px;
  padding: 10px;
  text-align: center;
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-5px);
}

.card img {
  width: 100%;
  height: 120px;
  object-fit: cover;
  border-radius: 8px;
}


footer {
  background: #111;
  color: white;
  text-align: center;
  padding: 20px;
}


.redes a {
  margin: 0 10px;
  font-size: 25px;
  transition: 0.3s;
}

.redes a.instagram { color: #E1306C; }
.redes a.facebook { color: #1877F2; }
.redes a.youtube { color: #FF0000; }
  
.redes a:hover {
  transform: scale(1.2);
  filter: brightness(1.2);
}
@media (max-width: 768px) {
  .grid {
    grid-template-columns: repeat(2, 1fr);
  }

  .destaque img {
    height: 200px;
  }
}

@media (max-width: 480px) {
  .grid {
    grid-template-columns: 1fr;
  }
}

</style>
</head>

<body>

<!-- TOPO -->
<div class="topo">
  <div class="container">
    
    <div class="logo">
      <img src="img/imglogo.jpg">
      <span>Escola Alonzo Barbuda</span>
    </div>

    <div class="menu">
      <a href="index.html target="_blank">Início</a>
      <a href="historia.html" target="_blank">História</a>
      <a href="eventos.html" target="_blank">Eventos</a>
    </div>

  </div>
</div>

<!-- CONTEÚDO -->
<div class="container">

  <!-- DESTAQUE -->
  <div class="destaque">
    <a href="historia.html" target="_blank">
      <img src="img/principal.jpg">
      <h2>História da Escola</h2>
      <p>Conheça toda a trajetória da instituição</p>
    </a>
  </div>

  <!-- CARDS -->
  <div class="grid">

    <div class="card">
      <a href="historia.html" target="_blank">
        <img src="img/1000187269.jpg">
        <h3>Construção</h3>
      </a>
    </div>

    <div class="card">
      <a href="alunos.html" target="_blank">
        <img src="img/img2.jpg">
        <h3>Primeiros alunos</h3>
      </a>
    </div>

    <div class="card">
      <a href="crescimento.html" target="_blaank">
        <img src="img/img3.jpg">
        <h3>Crescimento</h3>
      </a>
    </div>

    <div class="card">
      <a href="eventos.html" target="_blank">
        <img src="img/img4.jpg">
        <h3>Eventos</h3>
      </a>
    </div>

  </div>

</div>

<footer>
  <p>Siga a escola:</p>

  <div class="redes">
    <a href="https://www.instagram.com/alonzobarbuda/" class="instagram"target="_blank"><i class="fab fa-instagram"></i></a>
    <a href="https://www.facebook.com/alonzo.barbuda/" class="facebook"target="_blank"><i class="fab fa-facebook"></i></a>
    <a href="https://www.youtube.com/@tvalonzobarbuda5052" class="youtube" target="_blank"><i class="fab fa-youtube"></i></a>
  </div>

  <p>© 2026 Escola Alonzo Barbuda</p>
</footer>

</body>
</html>
