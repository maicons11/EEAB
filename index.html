
<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Escola Alonzo Barbuda</title>

<!-- ÍCONES (IMPORTANTE) -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f5f5f5;
}

/* TOPO */
.topo {
  background: #1e40af;
  color: white;
  padding: 15px;
}

.topo .container {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.logo {
  display: flex;
  align-items: center;
  gap: 10px;
}

.logo img {
  width: 40px;
}

.menu a {
  color: white;
  text-decoration: none;
  margin-left: 15px;
  font-weight: bold;
}

/* CONTAINER */
.container {
  width: 90%;
  max-width: 1000px;
  margin: 20px auto;
}

/* DESTAQUE */
.destaque img {
  width: 100%;
  height: 300px;
  object-fit: cover;
  border-radius: 12px;
}

.destaque h2 {
  margin: 10px 0 5px;
}

.destaque p {
  color: #555;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 15px;
  margin-top: 20px;
}

/* CARD */
.card {
  background: white;
  border-radius: 12px;
  padding: 10px;
  text-align: center;
}

.card img {
  width: 100%;
  height: 120px;
  object-fit: cover;
  border-radius: 8px;
}

.card h3 {
  font-size: 14px;
}

/* RODAPÉ */
footer {
  background: #222;
  color: white;
  text-align: center;
  padding: 20px;
}

/* ÍCONES */
.redes i {
  font-size: 25px;
  margin: 10px;
  color: white;
}

/* RESPONSIVO */
@media (max-width: 768px) {
  .grid {
    grid-template-columns: repeat(2, 1fr);
  }

  .destaque img {
    height: 200px;
  }
}

@media (max-width: 480px) {
  .grid {
    grid-template-columns: 1fr;
  }
}

</style>
</head>

<body>

<!-- TOPO -->
<div class="topo">
  <div class="container">
    
    <div class="logo">
      <img src="img/logo.jpg">
      <span>Escola Alonzo Barbuda</span>
    </div>

    <div class="menu">
      <a href="#">Início</a>
      <a href="#">História</a>
      <a href="#">Eventos</a>
    </div>

  </div>
</div>

<!-- CONTEÚDO -->
<div class="container">

  <!-- DESTAQUE -->
  <div class="destaque">
    <img src="img/principal.jpg">
    <h2>História da Escola</h2>
    <p>Conheça toda a trajetória da instituição</p>
  </div>

  <!-- CARDS -->
  <div class="grid">

    <div class="card">
      <img src="img/img1.jpg">
      <h3>Fundação</h3>
    </div>

    <div class="card">
      <img src="img/img2.jpg">
      <h3>Primeiros alunos</h3>
    </div>

    <div class="card">
      <img src="img/img3.jpg">
      <h3>Crescimento</h3>
    </div>

    <div class="card">
      <img src="img/img4.jpg">
      <h3>Eventos</h3>
    </div>

  </div>

</div>

<!-- RODAPÉ -->
<footer>
  <p>Siga a escola:</p>

  <div class="redes">
    <a href="#"><i class="fab fa-instagram"></i></a>
    <a href="#"><i class="fab fa-facebook"></i></a>
    <a href="#"><i class="fab fa-youtube"></i></a>
  </div>

  <p>© 2026 Escola Alonzo Barbuda</p>
</footer>

</body>
</html>
